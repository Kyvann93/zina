<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Image Upload - ZINA </title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1, h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="number"], input[type="file"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test d'Upload d'Images - ZINA Cantine BAD</h1>
    </div>

    <div class="two-columns">
        <div class="container">
            <h2>Créer une Nouvelle Catégorie</h2>
            <form action="/api/categories" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="cat-name">Nom de la Catégorie:</label>
                    <input type="text" id="cat-name" name="name" required placeholder="Ex: Petit Déjeuner">
                </div>
                
                <div class="form-group">
                    <label for="cat-description">Description:</label>
                    <input type="text" id="cat-description" name="description" placeholder="Description optionnelle">
                </div>
                
                <div class="form-group">
                    <label for="cat-image">Image de la Catégorie:</label>
                    <input type="file" id="cat-image" name="image" accept="image/*">
                </div>
                
                <button type="submit">Créer la Catégorie</button>
            </form>
        </div>

        <div class="container">
            <h2>Créer un Nouveau Produit</h2>
            <form action="/api/products" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="prod-name">Nom du Produit:</label>
                    <input type="text" id="prod-name" name="name" required placeholder="Ex: Café Complet">
                </div>
                
                <div class="form-group">
                    <label for="prod-description">Description:</label>
                    <input type="text" id="prod-description" name="description" placeholder="Description optionnelle">
                </div>
                
                <div class="form-group">
                    <label for="prod-price">Prix (FCFA):</label>
                    <input type="number" id="prod-price" name="price" required placeholder="3500" step="100" min="0">
                </div>
                
                <div class="form-group">
                    <label for="prod-category">ID Catégorie:</label>
                    <input type="number" id="prod-category" name="category_id" required placeholder="1" min="1">
                </div>
                
                <div class="form-group">
                    <label for="prod-image">Image du Produit:</label>
                    <input type="file" id="prod-image" name="image" accept="image/*">
                </div>
                
                <button type="submit">Créer le Produit</button>
            </form>
        </div>
    </div>

    <div class="container">
        <h2>Mettre à Jour des Éléments Existants</h2>
        
        <form action="/api/categories/1/image" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="cat-update">Nouvelle Image pour Catégorie ID 1:</label>
                <input type="file" id="cat-update" name="image" accept="image/*" required>
            </div>
            <button type="submit">Mettre à Jour l'Image Catégorie</button>
        </form>
        
        <hr style="margin: 20px 0;">
        
        <form action="/api/products/1/image" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="prod-update">Nouvelle Image pour Produit ID 1:</label>
                <input type="file" id="prod-update" name="image" accept="image/*" required>
            </div>
            <button type="submit">Mettre à Jour l'Image Produit</button>
        </form>
    </div>

    <div id="result" class="result" style="display: none;"></div>

    <script>
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const formData = new FormData(form);
                const resultDiv = document.getElementById('result');
                
                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        resultDiv.className = 'result success';
                        resultDiv.innerHTML = `
                            <strong>✅ Succès!</strong><br>
                            ${data.message || 'Opération réussie'}<br>
                            <small>${JSON.stringify(data, null, 2)}</small>
                        `;
                    } else {
                        resultDiv.className = 'result error';
                        resultDiv.innerHTML = `
                            <strong>❌ Erreur!</strong><br>
                            ${data.error || 'Échec de l\'opération'}<br>
                            <small>${JSON.stringify(data, null, 2)}</small>
                        `;
                    }
                    
                    resultDiv.style.display = 'block';
                    
                    // Reset form on success
                    if (response.ok) {
                        form.reset();
                    }
                    
                } catch (error) {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <strong>❌ Erreur de Réseau!</strong><br>
                        ${error.message}
                    `;
                    resultDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
