<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription — ZINA</title>
    <meta name="description" content="Inscrivez-vous à ZINA Cantine BAD" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.PNG') }}" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Tailwind + Flowbite CDN -->
    <script>
      tailwind.config = {
        corePlugins: { preflight: false },
        theme: {
          extend: {
            colors: {
              primary: { DEFAULT: '#581b1f', light: '#a0656b', dark: '#3d1215' }
            },
            fontFamily: {
              sans: ['Poppins', 'ui-sans-serif', 'system-ui'],
              display: ['"Playfair Display"', 'Georgia', 'serif']
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet"/>
    <!-- Shared CSS (loader only) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shared.css') }}" />
    <style>
      body { font-family: 'Poppins', sans-serif; }
      .auth-bg {
        background:
          linear-gradient(135deg, rgba(61,18,21,0.96) 0%, rgba(88,27,31,0.92) 50%, rgba(160,101,107,0.88) 100%),
          url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&h=1080&fit=crop') center/cover no-repeat fixed;
      }
      .glass-card {
        background: rgba(255,255,255,0.07);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.15);
      }
      .auth-input {
        width: 100%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        color: #fff;
        font-size: 0.9rem;
        transition: border-color 0.2s, background 0.2s;
        outline: none;
      }
      .auth-input::placeholder { color: rgba(255,255,255,0.45); }
      .auth-input:focus {
        border-color: rgba(255,255,255,0.5);
        background: rgba(255,255,255,0.15);
      }
      .auth-textarea {
        width: 100%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        color: #fff;
        font-size: 0.9rem;
        resize: vertical;
        min-height: 90px;
        outline: none;
        transition: border-color 0.2s, background 0.2s;
        font-family: 'Poppins', sans-serif;
      }
      .auth-textarea::placeholder { color: rgba(255,255,255,0.45); }
      .auth-textarea:focus {
        border-color: rgba(255,255,255,0.5);
        background: rgba(255,255,255,0.15);
      }
      .auth-label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: rgba(255,255,255,0.7);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.4rem;
      }
      .auth-btn-primary {
        width: 100%;
        background: #fff;
        color: #581b1f;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.85rem;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      .auth-btn-primary:hover {
        background: rgba(255,255,255,0.92);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }
    </style>
</head>
<body class="auth-bg min-h-screen flex flex-col items-center justify-center p-4 py-8">

    <div class="w-full max-w-md">

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="mb-4 px-4 py-3 rounded-xl text-sm font-semibold text-center
                    {% if category == 'success' %}bg-green-500/20 border border-green-400/40 text-green-200
                    {% else %}bg-red-500/20 border border-red-400/40 text-red-200{% endif %}">
                    <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %} mr-1"></i>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Card -->
        <div class="glass-card rounded-2xl p-8 shadow-2xl">

            <!-- Header -->
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-white/15 flex items-center justify-center mb-4 shadow-lg">
                    <img src="{{ url_for('static', filename='images/logo.PNG') }}" alt="ZINA" class="w-10 h-10 object-contain rounded-lg">
                </div>
                <h1 class="text-white font-display text-2xl font-bold tracking-tight">Créer un compte</h1>
                <p class="text-white/60 text-sm mt-1">Rejoignez ZINA Cantine BAD</p>
            </div>

            <!-- Form -->
            <form id="registerForm" action="{{ url_for('api.register_user') }}" method="POST" onsubmit="showFormLoader();">
                <div class="space-y-4">

                    <!-- Full name -->
                    <div>
                        <label class="auth-label" for="full_name">Nom Complet</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/40 pointer-events-none">
                                <i class="fas fa-user text-sm"></i>
                            </span>
                            <input class="auth-input" type="text" id="full_name" name="full_name"
                                   placeholder="Votre nom complet" required autocomplete="name" />
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="auth-label" for="email">Email</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/40 pointer-events-none">
                                <i class="fas fa-envelope text-sm"></i>
                            </span>
                            <input class="auth-input" type="email" id="email" name="email"
                                   placeholder="votre.email@gmail.com" required autocomplete="email" />
                        </div>
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="auth-label" for="phone">Téléphone</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-white/40 pointer-events-none">
                                <i class="fas fa-phone text-sm"></i>
                            </span>
                            <input class="auth-input" type="tel" id="phone" name="phone"
                                   placeholder="+225 XX XX XX XX XX" required autocomplete="tel" />
                        </div>
                    </div>

                    <!-- Notes -->
                    <div>
                        <label class="auth-label" for="notes">
                            Notes <span class="normal-case text-white/40 font-normal">(Allergies, préférences)</span>
                        </label>
                        <textarea class="auth-textarea" id="notes" name="notes" rows="3"
                                  placeholder="Informations importantes pour vos commandes..."></textarea>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="auth-btn-primary mt-1">
                        <i class="fas fa-user-plus"></i>
                        S'inscrire
                    </button>

                </div>
            </form>

            <!-- Login link -->
            <div class="mt-5 pt-5 border-t border-white/10 text-center">
                <a href="/login" class="text-white/65 text-sm hover:text-white transition-colors inline-flex items-center gap-2">
                    <i class="fas fa-sign-in-alt text-xs"></i>
                    Déjà un compte ? Se connecter
                </a>
            </div>

        </div>

        <!-- Back link -->
        <div class="text-center mt-5">
            <a href="/" class="text-white/55 text-sm hover:text-white transition-colors inline-flex items-center gap-2">
                <i class="fas fa-arrow-left text-xs"></i>
                Retour à l'accueil
            </a>
        </div>

    </div>

    <!-- ZINA Loader Overlay -->
    <div id="formLoader" class="zina-loader" style="display:none;">
        <div class="zl-inner">
            <div class="zl-logo-wrap">
                <div class="zl-ring"></div>
                <img src="{{ url_for('static', filename='images/logo.PNG') }}" alt="ZINA" class="zl-logo">
            </div>
            <p class="zl-text">Inscription en cours...</p>
            <div class="zl-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script>
        function showFormLoader() {
            const loader = document.getElementById('formLoader');
            if (loader) loader.style.display = 'flex';
        }
    </script>
</body>
</html>
