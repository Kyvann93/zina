<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription - ZINA</title>
    <meta name="description" content="Inscrivez-vous à ZINA" />
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo.PNG') }}"
    />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/ordering.css') }}"
    />
    <style>
      .register-only {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          linear-gradient(
            135deg,
            rgba(88, 27, 31, 0.95) 0%,
            rgba(160, 101, 107, 0.9) 100%
          ),
          url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&h=1080&fit=crop")
            center/cover;
      }

      .register-container {
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }
      .flash-message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            font-size:12px;
        }
        .flash-message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.5);
        }
        .flash-message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
        }
      .back-link {
        text-align: center;
        margin-top: 20px;
      }

      .back-link a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.3s ease;
      }

      .back-link a:hover {
        color: white;
      }

      .login-link {
        text-align: center;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }

      .login-link a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.3s ease;
      }

      .login-link a:hover {
        color: white;
      }

      .form-row {
        display: table-column;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      @media (max-width: 480px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="register-only">
      <div class="register-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="flash-message {{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
        <div class="login-modal">
          <div class="login-header">
            <h1>Inscription</h1>
            <p>Créez votre compte</p>
          </div>

          <div class="login-content">
            <div class="login-panel active" id="registerPanel">

              <form id="registerForm" action="{{ url_for('api.register_user') }}" method="POST" onsubmit="showFormLoader();">
                <div class="form-group">
                  <label for="full_name">
                    <i class="fas fa-user"></i>
                    Nom Complet *
                  </label>
                  <input
                    type="text"
                    id="full_name"
                    name="full_name"
                    placeholder="Votre nom complet"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="email">
                    <i class="fas fa-envelope"></i>
                    Email *
                  </label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="votre.email@gmail.com"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="phone">
                    <i class="fas fa-phone"></i>
                    Téléphone *
                  </label>
                  <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="+225 XX XX XX XX XX"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="notes">
                    <i class="fas fa-sticky-note"></i>
                    Notes (Allergies, Préférences)
                  </label>
                  <textarea
                    style="border-radius: 10px; padding: 10px; height: 100px; color:black;"
                    id="notes"
                    name="notes"
                    rows="3"
                    placeholder="Informations importantes pour vos commandes..."
                  ></textarea>
                </div>
                <button type="submit" class="login-submit-btn">
                  <i class="fas fa-user-plus"></i>
                  <span>S'inscrire</span>
                </button>
              </form>

              <div class="login-link">
                <a href="/login">
                  <i class="fas fa-sign-in-alt"></i>
                  Déjà un compte ? Se connecter
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="back-link">
          <a href="/">
            <i class="fas fa-arrow-left"></i>
            Retour à l'accueil
          </a>
        </div>
      </div>
    </div>

    <!-- Loader Overlay -->
    <div id="formLoader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10000; display: none;">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center;">
            <div style="font-size: 3em; margin-bottom: 10px;">
                <i class="fas fa-circle-notch fa-spin"></i>
            </div>
            <p style="color: #333; font-weight: bold;">Inscription en cours...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        function showFormLoader() {
            const loader = document.getElementById('formLoader');
            if (loader) {
                loader.style.display = 'flex';
            }
        }
    </script>
    <script src="{{ url_for('static', filename='js/ordering.js') }}"></script>
  </body>
</html>
