<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - ZINA </title>
    <meta name="description" content="Inscrivez-vous à ZINA">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.PNG') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ordering.css') }}">
    <style>
        .register-only {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(88, 27, 31, 0.95) 0%, rgba(160, 101, 107, 0.9) 100%),
                        url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&h=1080&fit=crop') center/cover;
        }
        
        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: white;
        }
        
        .login-link {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .login-link a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .login-link a:hover {
            color: white;
        }
        
        .form-row {
            display: table-column;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-only">
        <div class="register-container">
            <div class="login-modal">
                <div class="login-header">
                    <div class="login-logo">
                        <img src="{{ url_for('static', filename='images/logo.PNG') }}" style="width:40px;" alt="ZINA Cantine BAD">
                    </div>
                    <h1>Inscription</h1>
                    <p>Créez votre compte</p>
                </div>
                
                <div class="login-content">
                    <div class="login-panel active" id="registerPanel">
                        <form id="registerForm" onsubmit="handleRegistration(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="regEmployeeId">
                                        <i class="fas fa-id-badge"></i>
                                        Matricule *
                                    </label>
                                    <input type="text" id="regEmployeeId" placeholder="Ex: BAD-2024-001" required>
                                </div>
                                <div class="form-group">
                                    <label for="regFullName">
                                        <i class="fas fa-user"></i>
                                        Nom Complet *
                                    </label>
                                    <input type="text" id="regFullName" placeholder="Votre nom complet" required>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label for="regEmail">
                                    <i class="fas fa-envelope"></i>
                                    Email Professionnel *
                                </label>
                                <input type="email" id="regEmail" placeholder="votre.email@bad.org" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="regDepartment">
                                    <i class="fas fa-building"></i>
                                    Département *
                                </label>
                                <select id="regDepartment" required>
                                    <option value="">Sélectionnez votre département</option>
                                    <option value="agriculture">Agriculture et Agro-industrie</option>
                                    <option value="finance">Finance et Administration</option>
                                    <option value="operations">Opérations</option>
                                    <option value="ressources">Ressources Humaines</option>
                                    <option value="juridique">Juridique</option>
                                    <option value="communication">Communication</option>
                                    <option value="informatique">Informatique et Systèmes</option>
                                    <option value="autre">Autre</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="regPhone">
                                    <i class="fas fa-phone"></i>
                                    Téléphone (Optionnel)
                                </label>
                                <input type="tel" id="regPhone" placeholder="+225 XX XX XX XX XX">
                            </div>
                            
                            <div class="form-group">
                                <label for="regNotes">
                                    <i class="fas fa-sticky-note"></i>
                                    Notes (Allergies, Préférences)
                                </label>
                                <textarea id="regNotes" rows="3" placeholder="Informations importantes pour vos commandes..."></textarea>
                            </div>
                            
                            <button type="submit" class="login-submit-btn">
                                <i class="fas fa-user-plus"></i>
                                <span>S'inscrire</span>
                            </button>
                        </form>
                        
                        <div class="login-link">
                            <a href="/login">
                                <i class="fas fa-sign-in-alt"></i>
                                Déjà un compte ? Se connecter
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="back-link">
                <a href="/">
                    <i class="fas fa-arrow-left"></i>
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/ordering.js') }}"></script>
    <script>
        // Handle registration
        function handleRegistration(event) {
            event.preventDefault();
            
            const employeeId = document.getElementById('regEmployeeId').value;
            const fullName = document.getElementById('regFullName').value;
            const email = document.getElementById('regEmail').value;
            const department = document.getElementById('regDepartment').value;
            const phone = document.getElementById('regPhone').value;
            const notes = document.getElementById('regNotes').value;
            
            if (!employeeId || !fullName || !email || !department) {
                showToast('Veuillez remplir tous les champs obligatoires', 'error');
                return;
            }
            
            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('Veuillez entrer une adresse email valide', 'error');
                return;
            }
            
            // Create user object
            currentUser = {
                id: employeeId,
                name: fullName,
                email: email,
                department: department,
                phone: phone,
                notes: notes,
                isGuest: false,
                isNewUser: true
            };
            
            // Save to storage
            localStorage.setItem('zina_user', JSON.stringify(currentUser));
            sessionStorage.setItem('zina_user', JSON.stringify(currentUser));
            
            // Show success message
            showToast('Inscription réussie! Redirection...', 'success');
            
            // Redirect to ordering page
            setTimeout(() => {
                window.location.href = '/commander';
            }, 1500);
        }
        
        // Show toast function (if not already defined)
        function showToast(message, type = 'info') {
            // Create toast element if it doesn't exist
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    border-radius: 8px;
                    color: white;
                    font-weight: 500;
                    z-index: 10000;
                    opacity: 0;
                    transform: translateX(100%);
                    transition: all 0.3s ease;
                    max-width: 300px;
                `;
                document.body.appendChild(toast);
            }
            
            // Set message and style based on type
            toast.textContent = message;
            
            switch(type) {
                case 'success':
                    toast.style.background = '#28a745';
                    break;
                case 'error':
                    toast.style.background = '#dc3545';
                    break;
                case 'warning':
                    toast.style.background = '#ffc107';
                    toast.style.color = '#000';
                    break;
                default:
                    toast.style.background = '#007bff';
            }
            
            // Show toast
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateX(0)';
            }, 100);
            
            // Hide toast after 3 seconds
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
            }, 3000);
        }
    </script>
</body>
</html>
