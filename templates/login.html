<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ZINA Cantine BAD</title>
    <meta name="description" content="Connectez-vous à votre espace ZINA Cantine BAD">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.PNG') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ordering.css') }}">
    <style>
        .login-only {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(88, 27, 31, 0.95) 0%, rgba(160, 101, 107, 0.9) 100%),
                        url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&h=1080&fit=crop') center/cover;
        }
        
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: white;
        }
        
        .guest-access {
            text-align: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .guest-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .guest-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-only">
        <div class="login-container">
            <div class="login-modal">
                <div class="login-header">
                    <div class="login-logo">
                        <img src="{{ url_for('static', filename='images/logo.PNG') }}" style="width:40px;" alt="ZINA Cantine BAD">
                    </div>
                    <h1>ZINA Cantine BAD</h1>
                    <p>Connexion Employés - Banque Africaine de Développement</p>
                </div>
                
                <div class="login-content">
                    <div class="login-panel active" id="manualPanel">
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <div class="form-group">
                                <label for="employeeId">
                                    <i class="fas fa-id-badge"></i>
                                    Matricule Employé *
                                </label>
                                <input type="text" id="employeeId" placeholder="Ex: BAD-2024-001" required>
                            </div>
                            <div class="form-group">
                                <label for="employeeName">
                                    <i class="fas fa-user"></i>
                                    Nom Complet *
                                </label>
                                <input type="text" id="employeeName" placeholder="Votre nom" required>
                            </div>
                            <div class="form-group">
                                <label for="department">
                                    <i class="fas fa-building"></i>
                                    Département *
                                </label>
                                <select id="department" required>
                                    <option value="">Sélectionnez votre département</option>
                                    <option value="agriculture">Agriculture et Agro-industrie</option>
                                    <option value="finance">Finance et Administration</option>
                                    <option value="operations">Opérations</option>
                                    <option value="ressources">Ressources Humaines</option>
                                    <option value="juridique">Juridique</option>
                                    <option value="communication">Communication</option>
                                    <option value="informatique">Informatique et Systèmes</option>
                                    <option value="autre">Autre</option>
                                </select>
                            </div>
                            <button type="submit" class="login-submit-btn">
                                <i class="fas fa-sign-in-alt"></i>
                                <span>Se Connecter</span>
                            </button>
                        </form>
                        
                        <div class="register-option">
                            <div class="divider">
                                <span>OU</span>
                            </div>
                            <button class="register-btn" onclick="window.location.href='/register'">
                                <i class="fas fa-user-plus"></i>
                                <span>Nouvel Employé ? S'inscrire</span>
                            </button>
                        </div>
                        
                        <div class="guest-access">
                            <button class="guest-btn" onclick="handleGuestAccess()">
                                <i class="fas fa-user-secret"></i>
                                <span>Continuer en tant qu'Invité</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="back-link">
                <a href="/">
                    <i class="fas fa-arrow-left"></i>
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/ordering.js') }}"></script>
    <script>
        // Override handleLogin to redirect after successful login
        function handleLogin(event) {
            event.preventDefault();
            
            const employeeId = document.getElementById('employeeId').value;
            const employeeName = document.getElementById('employeeName').value;
            const department = document.getElementById('department').value;
            
            if (!employeeId || !employeeName || !department) {
                showToast('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            // Create user object
            currentUser = {
                id: employeeId,
                name: employeeName,
                department: department,
                isGuest: false
            };
            
            // Save to storage
            localStorage.setItem('zina_user', JSON.stringify(currentUser));
            sessionStorage.setItem('zina_user', JSON.stringify(currentUser));
            
            // Show success message
            showToast('Connexion réussie! Redirection...', 'success');
            
            // Redirect to ordering page
            setTimeout(() => {
                window.location.href = '/ordering';
            }, 1500);
        }
        
        // Handle guest access
        function handleGuestAccess() {
            currentUser = {
                id: null,
                name: 'Invité',
                department: 'Visiteur',
                isGuest: true
            };
            
            localStorage.setItem('zina_user', JSON.stringify(currentUser));
            sessionStorage.setItem('zina_user', JSON.stringify(currentUser));
            
            showToast('Accès invité activé! Redirection...', 'info');
            
            setTimeout(() => {
                window.location.href = '/ordering';
            }, 1500);
        }
    </script>
</body>
</html>
