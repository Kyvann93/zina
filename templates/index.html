<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINA Cantine BAD - Accueil</title>
    <meta name="description" content="Bienvenue à ZINA Cantine BAD - Service de restauration de la Banque Africaine de Développement">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.PNG') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #581b1f 0%, #a0656b 100%);
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden; /* Allow vertical scroll but prevent horizontal */
            overflow-y: auto; /* Allow vertical scrolling when needed */
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920&h=1080&fit=crop') center/cover;
            opacity: 0.2;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .logo-section {
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .logo img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 1rem;
        }
        
        .description {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 3rem;
            line-height: 1.6;
        }
        
        .actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 160px;
            justify-content: center;
        }
        
        .btn-primary {
            background: white;
            color: #581b1f;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }
        
        .info-section {
            margin-top: 4rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease 0.4s both;
        }
        
        .info-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .info-section p {
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .feature {
            text-align: center;
            padding: 1rem;
        }
        
        .feature i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .feature span {
            display: block;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Responsive Design */
        @media (max-width: 1200px) {
            .container {
                max-width: 90%;
                padding: 1.5rem;
            }
            
            h1 { font-size: 2.5rem; }
        }
        
        @media (max-width: 992px) {
            .container {
                max-width: 95%;
                padding: 1rem;
            }
            
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .description { font-size: 0.95rem; }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            
            .container {
                padding: 1.5rem 1rem;
                min-height: 100vh;
                justify-content: flex-start;
                padding-top: 2rem;
                padding-bottom: 2rem;
            }
            
            h1 { 
                font-size: 2rem; 
                line-height: 1.2;
            }
            
            .subtitle { 
                font-size: 1rem; 
                margin-bottom: 0.8rem;
            }
            
            .description { 
                font-size: 0.9rem;
                margin-bottom: 2rem;
            }
            
            .logo {
                width: 100px;
                height: 100px;
                margin-bottom: 1rem;
            }
            
            .logo img {
                width: 70px;
                height: 70px;
            }
            
            .actions { 
                flex-direction: column; 
                align-items: center; 
                gap: 1rem;
            }
            
            .btn { 
                width: 200px;
                padding: 0.9rem 1.5rem;
                font-size: 0.95rem;
            }
            
            .info-section {
                margin-top: 3rem;
                padding: 1.5rem;
            }
            
            .features {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }
            
            .feature i {
                font-size: 1.5rem;
            }
            
            .feature span {
                font-size: 0.8rem;
            }
        }
        
        @media (max-width: 576px) {
            body {
                padding: 0;
            }
            
            .container {
                padding: 1rem;
                margin: 0 1rem;
                min-height: 100vh;
                justify-content: flex-start;
                padding-top: 1.5rem;
                padding-bottom: 1.5rem;
            }
            
            h1 { 
                font-size: 1.8rem;
                margin-bottom: 0.3rem;
            }
            
            .subtitle { 
                font-size: 0.9rem; 
                margin-bottom: 0.6rem;
            }
            
            .description { 
                font-size: 0.85rem;
                line-height: 1.5;
                margin-bottom: 1.5rem;
            }
            
            .logo-section {
                margin-bottom: 2rem;
            }
            
            .logo {
                width: 80px;
                height: 80px;
                margin-bottom: 0.8rem;
            }
            
            .logo img {
                width: 60px;
                height: 60px;
            }
            
            .actions { 
                gap: 0.8rem;
            }
            
            .btn { 
                width: 100%;
                max-width: 250px;
                padding: 0.8rem 1.2rem;
                font-size: 0.9rem;
            }
            
            .info-section {
                margin-top: 2rem;
                padding: 1rem;
            }
            
            .info-section h3 {
                font-size: 1.3rem;
                margin-bottom: 0.8rem;
            }
            
            .info-section p {
                font-size: 0.85rem;
            }
            
            .features {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
            
            .feature {
                padding: 0.8rem;
            }
            
            .feature i {
                font-size: 1.3rem;
                margin-bottom: 0.3rem;
            }
            
            .feature span {
                font-size: 0.75rem;
            }
        }
        
        @media (max-width: 400px) {
            body {
                padding: 0;
            }
            
            .container {
                padding: 0.8rem;
                margin: 0 0.5rem;
                min-height: 100vh;
                justify-content: flex-start;
                padding-top: 1rem;
                padding-bottom: 1rem;
            }
            
            h1 { 
                font-size: 1.6rem;
            }
            
            .subtitle { 
                font-size: 0.85rem; 
            }
            
            .description { 
                font-size: 0.8rem;
            }
            
            .logo {
                width: 70px;
                height: 70px;
            }
            
            .logo img {
                width: 50px;
                height: 50px;
            }
            
            .btn { 
                padding: 0.7rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo" style="background:white;">
                <img src="{{ url_for('static', filename='images/logo.PNG') }}" alt="ZINA Cantine BAD">
            </div>
            <h1>ZINA Traiteur</h1>
        </div>
        
        <div class="actions">
            <a href="/login" class="btn btn-primary" >
                <i class="fas fa-sign-in-alt"></i>
                <span>Se Connecter</span>
            </a>
            <a href="/register" class="btn btn-secondary">
                <i class="fas fa-user-plus"></i>
                <span>S'inscrire</span>
            </a>
            <a href="/commander" class="btn btn-outline">
                <i class="fas fa-utensils"></i>
                <span>Invité</span>
            </a>
            
        </div>
    </div>
    
</body>
<script src="{{ url_for('static', filename='js/ordering.js') }}"></script>
    <script>
        // Override handleLogin to redirect after successful login
        function handleLogin(event) {
            event.preventDefault();
            
            const employeeId = document.getElementById('employeeId').value;
            const employeeName = document.getElementById('employeeName').value;
            const department = document.getElementById('department').value;
            
            if (!employeeId || !employeeName || !department) {
                showToast('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            // Create user object
            currentUser = {
                id: employeeId,
                name: employeeName,
                department: department,
                isGuest: false
            };
            
            // Save to storage
            localStorage.setItem('zina_user', JSON.stringify(currentUser));
            sessionStorage.setItem('zina_user', JSON.stringify(currentUser));
            
            // Show success message
            showToast('Connexion réussie! Redirection...', 'success');
            
            // Redirect to ordering page
            setTimeout(() => {
                window.location.href = '/ordering';
            }, 1500);
        }
        
        // Handle guest access
        function handleGuestAccess() {
            currentUser = {
                id: null,
                name: 'Invité',
                department: 'Visiteur',
                isGuest: true
            };
            
            localStorage.setItem('zina_user', JSON.stringify(currentUser));
            sessionStorage.setItem('zina_user', JSON.stringify(currentUser));
            
            showToast('Accès invité activé! Redirection...', 'info');
            
            setTimeout(() => {
                window.location.href = '/ordering';
            }, 1500);
        }
    </script>
</html>
